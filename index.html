<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CK-ERROR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    color:white;
}

/* BACKGROUND */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#001a16 0%,#000 40%),
    linear-gradient(to bottom,#000,#020202,#000);
    z-index:-5;
}

/* GRID */

.grid{
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(0,255,200,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,200,0.08) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridMove 15s linear infinite;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(40px);
    }
}

/* MAIN */

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* NAME */

.name{
    font-size:150px;
    font-weight:900;
    color:#00ffd5;
    text-shadow:
    0 0 10px #00ffd5,
    0 0 20px #00ffd5,
    0 0 40px #00ffd5,
    0 0 80px #00ffd5,
    0 0 150px #00ffd5;
    animation:glow 2s infinite alternate;
    letter-spacing:10px;
}

@keyframes glow{

    from{
        text-shadow:
        0 0 10px #00ffd5,
        0 0 20px #00ffd5;
    }

    to{
        text-shadow:
        0 0 20px #00ffd5,
        0 0 40px #00ffd5,
        0 0 100px #00ffd5,
        0 0 180px #00ffd5;
    }
}

/* SUB */

.sub{
    margin-top:25px;
    font-size:40px;
    color:#999;
    letter-spacing:15px;
}

/* LINE */

.line{
    width:500px;
    height:3px;
    background:#00ffd5;
    margin:40px auto;
    box-shadow:
    0 0 10px #00ffd5,
    0 0 30px #00ffd5,
    0 0 60px #00ffd5;
}

/* TEXT */

.desc{
    max-width:1000px;
    font-size:22px;
    color:#aaa;
    line-height:45px;
    margin-bottom:50px;
    padding:0 20px;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:20px 60px;
    font-size:20px;
    font-weight:bold;
    border-radius:60px;
    border:2px solid #00ffd5;
    color:#00ffd5;
    background:transparent;
    text-decoration:none;
    transition:0.5s;
    box-shadow:
    0 0 15px rgba(0,255,213,0.5);
}

.btn:hover{
    background:#00ffd5;
    color:black;
    transform:scale(1.08);
    box-shadow:
    0 0 20px #00ffd5,
    0 0 50px #00ffd5,
    0 0 100px #00ffd5;
}

/* FOOTER */

.footer{
    position:absolute;
    bottom:20px;
    font-size:15px;
    color:#555;
    letter-spacing:5px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .name{
        font-size:70px;
    }

    .sub{
        font-size:20px;
        letter-spacing:5px;
    }

    .line{
        width:250px;
    }

    .desc{
        font-size:16px;
        line-height:30px;
    }

    .btn{
        padding:15px 35px;
        font-size:15px;
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="container">

    <div class="name">
        CK-ERROR
    </div>

    <div class="sub">
        HACKER • CYBER • DARK WEB
    </div>

    <div class="line"></div>

    <div class="desc">
        Welcome To My Cyber World.<br>
        Professional Dark Style Portfolio Website.<br>
        Futuristic Hacker Interface With Neon Glow Effects.<br>
        Built For Pure Dark Vibes 💀
    </div>

    <div class="buttons">

        <a href="https://wa.me/919046579718" class="btn">
            WHATSAPP
        </a>

        <a href="#" class="btn">
            EXPLORE
        </a>

    </div>

</div>

<div class="footer">
    © 2026 CK-ERROR | ALL RIGHTS RESERVED
</div>

</body>
      </html>
